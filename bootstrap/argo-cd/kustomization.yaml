apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
- github.com/argoproj-labs/argocd-autopilot/manifests/base?ref=v0.4.17

configMapGenerator:
- behavior: merge
  literals:
  - repository.credentials=- passwordSecret: git_token
      url: https://github.com/
      usernameSecret: git_username
      name: autopilot-secret
      admin.enabled: "true"
      kustomize.buildOptions: "--enable-alpha-plugins --enable-helm --load-restrictor LoadRestrictionsNone"
  name: argocd-cm
