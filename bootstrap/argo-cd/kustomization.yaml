apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
- github.com/argoproj-labs/argocd-autopilot/manifests/base?ref=v0.4.17

configMapGenerator:
- behavior: merge
  literals:
    - repository.credentials: "- passwordSecret: git_token\n  url: https://github.com/\n  usernameSecret: git_username\n  name: autopilot-secret\n  admin.enabled: \"true\"\n  kustomize.buildOptions: \"--enable-alpha-plugins --enable-helm --load-restrictor LoadRestrictionsNone\""
  name: argocd-cm
